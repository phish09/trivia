name: Supabase Keepalive

# Requires one of:
#   Secret or variable SITE_URL  → https://your-app.netlify.app (no trailing slash)
#   Secret KEEPALIVE_SECRET       → same value as KEEPALIVE_SECRET in Netlify
# Add at: https://github.com/<owner>/<repo>/settings/secrets/actions
# Use the "Variables" tab for SITE_URL (it's public); use "Secrets" for KEEPALIVE_SECRET.

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Verify configuration
        env:
          SITE_URL_SECRET: ${{ secrets.SITE_URL }}
          SITE_URL_VAR: ${{ vars.SITE_URL }}
          TOKEN_SECRET: ${{ secrets.KEEPALIVE_SECRET }}
        run: |
          SITE_URL="${SITE_URL_SECRET:-$SITE_URL_VAR}"
          SITE_URL="${SITE_URL%/}"
          if [ -z "$SITE_URL" ]; then
            echo "::error::SITE_URL is not set."
            echo "Add it: GitHub repo → Settings → Secrets and variables → Actions"
            echo "  • Variables tab: Name SITE_URL, Value https://YOUR_SITE.netlify.app"
            echo "  • OR Secrets tab: Name SITE_URL (same value)"
            echo "Open: https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            exit 1
          fi
          if [ -z "$TOKEN_SECRET" ]; then
            echo "::error::KEEPALIVE_SECRET is not set (Secrets tab only)."
            echo "Open: https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            exit 1
          fi
          echo "Configuration OK."

      - name: Ping keepalive endpoint
        id: keepalive
        env:
          SITE_URL_SECRET: ${{ secrets.SITE_URL }}
          SITE_URL_VAR: ${{ vars.SITE_URL }}
          TOKEN: ${{ secrets.KEEPALIVE_SECRET }}
        run: |
          SITE_URL="${SITE_URL_SECRET:-$SITE_URL_VAR}"
          SITE_URL="${SITE_URL%/}"
          RESPONSE=$(curl -s -w "\n%{http_code}" "${SITE_URL}/api/keepalive?token=${TOKEN}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Keepalive returned $HTTP_CODE. $BODY"
            echo "::error::503 = Add KEEPALIVE_SECRET in Netlify env vars. 401 = token mismatch (GitHub secret vs Netlify must match). 404 = wrong SITE_URL."
            exit 1
          fi
          echo "Keepalive OK - Supabase activity recorded."
