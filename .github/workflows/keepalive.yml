name: Supabase Keepalive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.SITE_URL }}" ]; then echo "::error::SITE_URL secret is not set. Add it at repo Settings > Secrets and variables > Actions"; exit 1; fi
          if [ -z "${{ secrets.KEEPALIVE_SECRET }}" ]; then echo "::error::KEEPALIVE_SECRET secret is not set. Add it at repo Settings > Secrets and variables > Actions"; exit 1; fi
          echo "Secrets configured."

      - name: Ping keepalive endpoint
        id: keepalive
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          SITE_URL="${SITE_URL%/}"
          TOKEN="${{ secrets.KEEPALIVE_SECRET }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" "${SITE_URL}/api/keepalive?token=${TOKEN}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Keepalive returned $HTTP_CODE. $BODY"
            echo "::error::503 = Add KEEPALIVE_SECRET in Netlify env vars. 401 = token mismatch (GitHub secret vs Netlify must match). 404 = wrong SITE_URL."
            exit 1
          fi
          echo "Keepalive OK - Supabase activity recorded."
